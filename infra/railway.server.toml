# Railway service config for the public-facing teamshared MCP server.
#
# Apply by setting "Custom config file path" to /infra/railway.server.toml in
# the Railway service Settings → Source panel. See infra/railway.example.md
# for the full deploy walkthrough.
#
# Settings here override anything set in the dashboard. If you tweak these,
# remember to commit the change so future deploys pick it up.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile"

[deploy]
# Apply SQL migrations before the server takes traffic. Idempotent — the
# teamshared_migrations table prevents reruns.
preDeployCommand = ["teamshared migrate"]

# Default CMD in the Dockerfile is `teamshared serve --transport http`; no override
# needed. The server reads $PORT from env (see Settings.port alias).
startCommand = "teamshared serve --transport http"

# /health returns 200 with a per-dependency status dict. We only ask Railway
# to confirm the process is alive; degraded sub-deps (e.g. Mem0 cold) are
# observable via the JSON body, not by failing the deploy.
healthcheckPath = "/health"
healthcheckTimeout = 30

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
