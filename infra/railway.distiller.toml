# Railway service config for the teamshared distillation worker.
#
# Apply by setting "Custom config file path" to /infra/railway.distiller.toml
# in the Railway service Settings → Source panel. See infra/railway.example.md
# for the full deploy walkthrough.
#
# This service has no public domain, no port, no healthcheck — it just
# blocks on the Redis distill queue and writes summaries through Mem0.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile"

[deploy]
startCommand = "teamshared worker"
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
