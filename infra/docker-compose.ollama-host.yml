# Use when Ollama runs on the host and bridge networking cannot reach it
# (common on Linux: container -> host.docker.internal times out).
#
#   docker compose --env-file .env \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.ollama-host.yml up -d --build
#
# Postgres and Redis stay on the compose network; their ports are published to
# the host so server/distiller (host network) reach them via 127.0.0.1.

services:
  server:
    network_mode: host
    ports: !reset []
    environment:
      SPTX_PG_HOST: 127.0.0.1
      SPTX_PG_PORT: ${SPTX_PG_PORT:-5432}
      SPTX_REDIS_URL: redis://127.0.0.1:6379/0
      SPTX_OLLAMA_BASE_URL: http://127.0.0.1:11434

  distiller:
    network_mode: host
    environment:
      SPTX_PG_HOST: 127.0.0.1
      SPTX_PG_PORT: ${SPTX_PG_PORT:-5432}
      SPTX_REDIS_URL: redis://127.0.0.1:6379/0
      SPTX_OLLAMA_BASE_URL: http://127.0.0.1:11434
