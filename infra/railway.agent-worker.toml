# Railway service config for the teamshared background agent-run worker.
#
# Apply by setting "Custom config file path" to /infra/railway.agent-worker.toml
# in the Railway service Settings → Source panel. See infra/railway.example.md
# for the full deploy walkthrough.
#
# This service has no public domain, no port, no healthcheck — it consumes the
# Redis `agent:runs` stream, executes one Work Board task per job through the
# OpenRouter chat client, and stamps an `agent-worker` heartbeat for /health.

"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile"

[deploy]
startCommand = "teamshared agent-worker"
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
