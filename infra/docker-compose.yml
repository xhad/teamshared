# actx local/dev stack.
#
# Bring up:   docker compose -f infra/docker-compose.yml up -d
# Migrate:    docker compose -f infra/docker-compose.yml run --rm server actx migrate
# Mint token: docker compose -f infra/docker-compose.yml run --rm server actx token mint cursor
#
# Production deployment is the same image, fronted by Tailscale Serve or
# Caddy/Traefik for TLS. See infra/tailscale.example.md.

name: actx

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${ACTX_PG_USER:-actx}
      POSTGRES_PASSWORD: ${ACTX_PG_PASSWORD:-actx}
      POSTGRES_DB: ${ACTX_PG_DB:-actx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${ACTX_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACTX_PG_USER:-actx} -d ${ACTX_PG_DB:-actx}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ACTX_PG_HOST: postgres
      ACTX_PG_PORT: 5432
      ACTX_PG_USER: ${ACTX_PG_USER:-actx}
      ACTX_PG_PASSWORD: ${ACTX_PG_PASSWORD:-actx}
      ACTX_PG_DB: ${ACTX_PG_DB:-actx}
      ACTX_REDIS_URL: redis://redis:6379/0
      ACTX_TOKENS_FILE: /data/tokens.json
      ACTX_AUTH_DISABLED: ${ACTX_AUTH_DISABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ACTX_EMBED_PROVIDER: ${ACTX_EMBED_PROVIDER:-openai}
      ACTX_EMBED_MODEL: ${ACTX_EMBED_MODEL:-text-embedding-3-small}
      ACTX_EMBED_DIMS: ${ACTX_EMBED_DIMS:-1536}
      ACTX_LLM_PROVIDER: ${ACTX_LLM_PROVIDER:-openai}
      ACTX_LLM_MODEL: ${ACTX_LLM_MODEL:-gpt-4o-mini}
      ACTX_OLLAMA_BASE_URL: ${ACTX_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - actxdata:/data
    ports:
      - "${ACTX_PORT:-8077}:8077"

  distiller:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ACTX_PG_HOST: postgres
      ACTX_PG_PORT: 5432
      ACTX_PG_USER: ${ACTX_PG_USER:-actx}
      ACTX_PG_PASSWORD: ${ACTX_PG_PASSWORD:-actx}
      ACTX_PG_DB: ${ACTX_PG_DB:-actx}
      ACTX_REDIS_URL: redis://redis:6379/0
      ACTX_TOKENS_FILE: /data/tokens.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ACTX_EMBED_PROVIDER: ${ACTX_EMBED_PROVIDER:-openai}
      ACTX_EMBED_MODEL: ${ACTX_EMBED_MODEL:-text-embedding-3-small}
      ACTX_EMBED_DIMS: ${ACTX_EMBED_DIMS:-1536}
      ACTX_LLM_PROVIDER: ${ACTX_LLM_PROVIDER:-openai}
      ACTX_LLM_MODEL: ${ACTX_LLM_MODEL:-gpt-4o-mini}
      ACTX_OLLAMA_BASE_URL: ${ACTX_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - actxdata:/data
    command: ["actx", "worker"]

  # Optional: enable when ACTX_NEO4J_ENABLED=true and you want the relationship graph.
  # neo4j:
  #   image: neo4j:5
  #   environment:
  #     NEO4J_AUTH: ${ACTX_NEO4J_USER:-neo4j}/${ACTX_NEO4J_PASSWORD:-neo4j}
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   volumes:
  #     - neo4jdata:/data

volumes:
  pgdata:
  redisdata:
  actxdata:
  # neo4jdata:
