# sptx local/dev stack.
#
# Bring up:   docker compose -f infra/docker-compose.yml up -d
# Migrate:    docker compose -f infra/docker-compose.yml run --rm server sptx migrate
# Mint token: docker compose -f infra/docker-compose.yml run --rm server sptx token mint cursor
#
# Production deployment is the same image, fronted by Tailscale Serve or
# Caddy/Traefik for TLS. See infra/tailscale.example.md.

name: sptx

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${SPTX_PG_USER:-sptx}
      POSTGRES_PASSWORD: ${SPTX_PG_PASSWORD:-sptx}
      POSTGRES_DB: ${SPTX_PG_DB:-sptx}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${SPTX_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPTX_PG_USER:-sptx} -d ${SPTX_PG_DB:-sptx}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPTX_PG_HOST: postgres
      SPTX_PG_PORT: 5432
      SPTX_PG_USER: ${SPTX_PG_USER:-sptx}
      SPTX_PG_PASSWORD: ${SPTX_PG_PASSWORD:-sptx}
      SPTX_PG_DB: ${SPTX_PG_DB:-sptx}
      SPTX_REDIS_URL: redis://redis:6379/0
      SPTX_TOKENS_FILE: /data/tokens.json
      SPTX_AUTH_DISABLED: ${SPTX_AUTH_DISABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPTX_EMBED_PROVIDER: ${SPTX_EMBED_PROVIDER:-openai}
      SPTX_EMBED_MODEL: ${SPTX_EMBED_MODEL:-text-embedding-3-small}
      SPTX_EMBED_DIMS: ${SPTX_EMBED_DIMS:-1536}
      SPTX_LLM_PROVIDER: ${SPTX_LLM_PROVIDER:-openai}
      SPTX_LLM_MODEL: ${SPTX_LLM_MODEL:-gpt-4o-mini}
      SPTX_OLLAMA_BASE_URL: ${SPTX_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - sptxdata:/data
    ports:
      - "${SPTX_PORT:-8077}:8077"

  distiller:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPTX_PG_HOST: postgres
      SPTX_PG_PORT: 5432
      SPTX_PG_USER: ${SPTX_PG_USER:-sptx}
      SPTX_PG_PASSWORD: ${SPTX_PG_PASSWORD:-sptx}
      SPTX_PG_DB: ${SPTX_PG_DB:-sptx}
      SPTX_REDIS_URL: redis://redis:6379/0
      SPTX_TOKENS_FILE: /data/tokens.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SPTX_EMBED_PROVIDER: ${SPTX_EMBED_PROVIDER:-openai}
      SPTX_EMBED_MODEL: ${SPTX_EMBED_MODEL:-text-embedding-3-small}
      SPTX_EMBED_DIMS: ${SPTX_EMBED_DIMS:-1536}
      SPTX_LLM_PROVIDER: ${SPTX_LLM_PROVIDER:-openai}
      SPTX_LLM_MODEL: ${SPTX_LLM_MODEL:-gpt-4o-mini}
      SPTX_OLLAMA_BASE_URL: ${SPTX_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - sptxdata:/data
    command: ["sptx", "worker"]

  # Optional: enable when SPTX_NEO4J_ENABLED=true and you want the relationship graph.
  # neo4j:
  #   image: neo4j:5
  #   environment:
  #     NEO4J_AUTH: ${SPTX_NEO4J_USER:-neo4j}/${SPTX_NEO4J_PASSWORD:-neo4j}
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   volumes:
  #     - neo4jdata:/data

volumes:
  pgdata:
  redisdata:
  sptxdata:
  # neo4jdata:
