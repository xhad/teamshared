# teamshared stack (single source of truth for local dev AND production).
#
# Bring up:   make build      (docker compose --env-file .env -f infra/docker-compose.yml up -d --build)
# Migrate:    make migrate
# Mint token: make token-mint
#
# Default: HOST Ollama at ``http://host.docker.internal:11434`` (GPU on macOS/Linux).
# Start it with ``make ollama-host`` (``OLLAMA_HOST=0.0.0.0:11434``). Optional bundled
# service: ``make build-bundled-ollama`` (compose profile ``bundled-ollama``).
# Linux: allow the docker bridge to port 11434 if needed
# (e.g. ``sudo ufw allow from 172.16.0.0/12 to any port 11434 proto tcp``).
#
# Production deployment is the same image, fronted by Tailscale Serve or
# Caddy/Traefik for TLS. See infra/tailscale.example.md.

name: teamshared

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${TEAMSHARED_PG_USER:-teamshared}
      POSTGRES_PASSWORD: ${TEAMSHARED_PG_PASSWORD:-teamshared}
      POSTGRES_DB: ${TEAMSHARED_PG_DB:-teamshared}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${TEAMSHARED_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEAMSHARED_PG_USER:-teamshared} -d ${TEAMSHARED_PG_DB:-teamshared}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "${TEAMSHARED_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # CPU-only fallback; enable with: COMPOSE_PROFILES=bundled-ollama make build
  ollama:
    profiles: ["bundled-ollama"]
    image: ollama/ollama:latest
    ports:
      - "${TEAMSHARED_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8077/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      TEAMSHARED_PG_HOST: postgres
      TEAMSHARED_PG_PORT: 5432
      TEAMSHARED_PG_USER: ${TEAMSHARED_PG_USER:-teamshared}
      TEAMSHARED_PG_PASSWORD: ${TEAMSHARED_PG_PASSWORD:-teamshared}
      TEAMSHARED_PG_DB: ${TEAMSHARED_PG_DB:-teamshared}
      # Non-superuser app role so RLS is enforced (see provision-app-role).
      TEAMSHARED_PG_APP_USER: ${TEAMSHARED_PG_APP_USER:-}
      TEAMSHARED_PG_APP_PASSWORD: ${TEAMSHARED_PG_APP_PASSWORD:-}
      TEAMSHARED_REDIS_URL: redis://redis:6379/0
      TEAMSHARED_INVITES_FILE: /data/invites.json
      TEAMSHARED_PUBLIC_URL: ${TEAMSHARED_PUBLIC_URL:-}
      TEAMSHARED_MINT_SECRET: ${TEAMSHARED_MINT_SECRET:-}
      TEAMSHARED_AUTH_DISABLED: ${TEAMSHARED_AUTH_DISABLED:-false}
      TEAMSHARED_SESSION_SECRET: ${TEAMSHARED_SESSION_SECRET:-}
      TEAMSHARED_DASHBOARD_OWNER_EMAIL: ${TEAMSHARED_DASHBOARD_OWNER_EMAIL:-}
      TEAMSHARED_API_ADMIN_SECRET: ${TEAMSHARED_API_ADMIN_SECRET:-}
      TEAMSHARED_CONNECTOR_ENCRYPTION_KEY: ${TEAMSHARED_CONNECTOR_ENCRYPTION_KEY:-}
      # Console sign-in OTP + SMTP delivery (read by teamshared.server.mailer).
      TEAMSHARED_OTP_TTL_SECONDS: ${TEAMSHARED_OTP_TTL_SECONDS:-300}
      TEAMSHARED_OTP_MAX_ATTEMPTS: ${TEAMSHARED_OTP_MAX_ATTEMPTS:-5}
      TEAMSHARED_SMTP_HOST: ${TEAMSHARED_SMTP_HOST:-}
      TEAMSHARED_SMTP_PORT: ${TEAMSHARED_SMTP_PORT:-587}
      TEAMSHARED_SMTP_USERNAME: ${TEAMSHARED_SMTP_USERNAME:-}
      TEAMSHARED_SMTP_PASSWORD: ${TEAMSHARED_SMTP_PASSWORD:-}
      TEAMSHARED_SMTP_FROM: ${TEAMSHARED_SMTP_FROM:-}
      TEAMSHARED_SMTP_STARTTLS: ${TEAMSHARED_SMTP_STARTTLS:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TEAMSHARED_OPENROUTER_API_KEY: ${TEAMSHARED_OPENROUTER_API_KEY:-${OPENROUTER_API_KEY:-}}
      TEAMSHARED_EMBED_PROVIDER: ${TEAMSHARED_EMBED_PROVIDER:-openai}
      TEAMSHARED_EMBED_MODEL: ${TEAMSHARED_EMBED_MODEL:-text-embedding-3-small}
      TEAMSHARED_EMBED_DIMS: ${TEAMSHARED_EMBED_DIMS:-1536}
      TEAMSHARED_EMBED_LOCAL_MODEL: ${TEAMSHARED_EMBED_LOCAL_MODEL:-BAAI/bge-small-en-v1.5}
      TEAMSHARED_HNSW_CACHE_ENABLED: ${TEAMSHARED_HNSW_CACHE_ENABLED:-true}
      TEAMSHARED_LLM_PROVIDER: ${TEAMSHARED_LLM_PROVIDER:-openai}
      TEAMSHARED_LLM_MODEL: ${TEAMSHARED_LLM_MODEL:-gpt-4o-mini}
      TEAMSHARED_OLLAMA_BASE_URL: ${TEAMSHARED_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      TEAMSHARED_NEO4J_URL: bolt://neo4j:7687
      TEAMSHARED_NEO4J_USER: ${TEAMSHARED_NEO4J_USER:-neo4j}
      TEAMSHARED_NEO4J_PASSWORD: ${TEAMSHARED_NEO4J_PASSWORD:-neo4j}
    volumes:
      - teamshareddata:/data
    ports:
      - "${TEAMSHARED_PORT:-8077}:8077"

  distiller:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TEAMSHARED_PG_HOST: postgres
      TEAMSHARED_PG_PORT: 5432
      TEAMSHARED_PG_USER: ${TEAMSHARED_PG_USER:-teamshared}
      TEAMSHARED_PG_PASSWORD: ${TEAMSHARED_PG_PASSWORD:-teamshared}
      TEAMSHARED_PG_DB: ${TEAMSHARED_PG_DB:-teamshared}
      # Non-superuser app role so RLS is enforced (see provision-app-role).
      TEAMSHARED_PG_APP_USER: ${TEAMSHARED_PG_APP_USER:-}
      TEAMSHARED_PG_APP_PASSWORD: ${TEAMSHARED_PG_APP_PASSWORD:-}
      TEAMSHARED_REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TEAMSHARED_OPENROUTER_API_KEY: ${TEAMSHARED_OPENROUTER_API_KEY:-${OPENROUTER_API_KEY:-}}
      TEAMSHARED_EMBED_PROVIDER: ${TEAMSHARED_EMBED_PROVIDER:-openai}
      TEAMSHARED_EMBED_MODEL: ${TEAMSHARED_EMBED_MODEL:-text-embedding-3-small}
      TEAMSHARED_EMBED_DIMS: ${TEAMSHARED_EMBED_DIMS:-1536}
      TEAMSHARED_EMBED_LOCAL_MODEL: ${TEAMSHARED_EMBED_LOCAL_MODEL:-BAAI/bge-small-en-v1.5}
      TEAMSHARED_HNSW_CACHE_ENABLED: ${TEAMSHARED_HNSW_CACHE_ENABLED:-true}
      TEAMSHARED_LLM_PROVIDER: ${TEAMSHARED_LLM_PROVIDER:-openai}
      TEAMSHARED_LLM_MODEL: ${TEAMSHARED_LLM_MODEL:-gpt-4o-mini}
      TEAMSHARED_OLLAMA_BASE_URL: ${TEAMSHARED_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - teamshareddata:/data
    command: ["teamshared", "worker"]
    # Probe the Redis heartbeat the worker writes.
    healthcheck:
      test: ["CMD", "teamshared", "worker-health", "distiller"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  curator:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TEAMSHARED_PG_HOST: postgres
      TEAMSHARED_PG_PORT: 5432
      TEAMSHARED_PG_USER: ${TEAMSHARED_PG_USER:-teamshared}
      TEAMSHARED_PG_PASSWORD: ${TEAMSHARED_PG_PASSWORD:-teamshared}
      TEAMSHARED_PG_DB: ${TEAMSHARED_PG_DB:-teamshared}
      # Non-superuser app role so RLS is enforced (see provision-app-role).
      TEAMSHARED_PG_APP_USER: ${TEAMSHARED_PG_APP_USER:-}
      TEAMSHARED_PG_APP_PASSWORD: ${TEAMSHARED_PG_APP_PASSWORD:-}
      TEAMSHARED_REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TEAMSHARED_OPENROUTER_API_KEY: ${TEAMSHARED_OPENROUTER_API_KEY:-${OPENROUTER_API_KEY:-}}
      TEAMSHARED_EMBED_PROVIDER: ${TEAMSHARED_EMBED_PROVIDER:-openai}
      TEAMSHARED_EMBED_MODEL: ${TEAMSHARED_EMBED_MODEL:-text-embedding-3-small}
      TEAMSHARED_EMBED_DIMS: ${TEAMSHARED_EMBED_DIMS:-1536}
      TEAMSHARED_EMBED_LOCAL_MODEL: ${TEAMSHARED_EMBED_LOCAL_MODEL:-BAAI/bge-small-en-v1.5}
      TEAMSHARED_HNSW_CACHE_ENABLED: ${TEAMSHARED_HNSW_CACHE_ENABLED:-true}
      TEAMSHARED_LLM_PROVIDER: ${TEAMSHARED_LLM_PROVIDER:-openai}
      TEAMSHARED_LLM_MODEL: ${TEAMSHARED_LLM_MODEL:-gpt-4o-mini}
      TEAMSHARED_OLLAMA_BASE_URL: ${TEAMSHARED_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - teamshareddata:/data
    command: ["teamshared", "curator"]
    # Probe the Redis heartbeat the worker writes.
    healthcheck:
      test: ["CMD", "teamshared", "worker-health", "curator"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Relationship graph (always on). Use a password >= 8 chars; Neo4j 5 rejects
  # the factory default "neo4j".
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${TEAMSHARED_NEO4J_USER:-neo4j}/${TEAMSHARED_NEO4J_PASSWORD:-neo4j}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      # HTTP endpoint is up once the server is accepting connections (does not
      # depend on auth), so the app can start as soon as Neo4j is reachable.
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  pgdata:
  redisdata:
  ollamadata:
  teamshareddata:
  neo4jdata:
