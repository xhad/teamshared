# teamshared local/dev stack.
#
# Bring up:   docker compose -f infra/docker-compose.yml up -d
# Migrate:    docker compose -f infra/docker-compose.yml run --rm server teamshared migrate
# Mint token: docker compose -f infra/docker-compose.yml run --rm server teamshared token mint cursor
#
# Production deployment is the same image, fronted by Tailscale Serve or
# Caddy/Traefik for TLS. See infra/tailscale.example.md.

name: teamshared

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${TEAMSHARED_PG_USER:-teamshared}
      POSTGRES_PASSWORD: ${TEAMSHARED_PG_PASSWORD:-teamshared}
      POSTGRES_DB: ${TEAMSHARED_PG_DB:-teamshared}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${TEAMSHARED_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEAMSHARED_PG_USER:-teamshared} -d ${TEAMSHARED_PG_DB:-teamshared}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "${TEAMSHARED_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TEAMSHARED_PG_HOST: postgres
      TEAMSHARED_PG_PORT: 5432
      TEAMSHARED_PG_USER: ${TEAMSHARED_PG_USER:-teamshared}
      TEAMSHARED_PG_PASSWORD: ${TEAMSHARED_PG_PASSWORD:-teamshared}
      TEAMSHARED_PG_DB: ${TEAMSHARED_PG_DB:-teamshared}
      TEAMSHARED_REDIS_URL: redis://redis:6379/0
      TEAMSHARED_TOKENS_FILE: /data/tokens.json
      TEAMSHARED_INVITES_FILE: /data/invites.json
      TEAMSHARED_PUBLIC_URL: ${TEAMSHARED_PUBLIC_URL:-}
      TEAMSHARED_MINT_SECRET: ${TEAMSHARED_MINT_SECRET:-}
      TEAMSHARED_AUTH_DISABLED: ${TEAMSHARED_AUTH_DISABLED:-false}
      TEAMSHARED_SESSION_SECRET: ${TEAMSHARED_SESSION_SECRET:-}
      TEAMSHARED_DASHBOARD_OWNER_EMAIL: ${TEAMSHARED_DASHBOARD_OWNER_EMAIL:-}
      TEAMSHARED_API_ADMIN_SECRET: ${TEAMSHARED_API_ADMIN_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TEAMSHARED_EMBED_PROVIDER: ${TEAMSHARED_EMBED_PROVIDER:-openai}
      TEAMSHARED_EMBED_MODEL: ${TEAMSHARED_EMBED_MODEL:-text-embedding-3-small}
      TEAMSHARED_EMBED_DIMS: ${TEAMSHARED_EMBED_DIMS:-1536}
      TEAMSHARED_LLM_PROVIDER: ${TEAMSHARED_LLM_PROVIDER:-openai}
      TEAMSHARED_LLM_MODEL: ${TEAMSHARED_LLM_MODEL:-gpt-4o-mini}
      TEAMSHARED_OLLAMA_BASE_URL: ${TEAMSHARED_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - teamshareddata:/data
    ports:
      - "${TEAMSHARED_PORT:-8077}:8077"

  distiller:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TEAMSHARED_PG_HOST: postgres
      TEAMSHARED_PG_PORT: 5432
      TEAMSHARED_PG_USER: ${TEAMSHARED_PG_USER:-teamshared}
      TEAMSHARED_PG_PASSWORD: ${TEAMSHARED_PG_PASSWORD:-teamshared}
      TEAMSHARED_PG_DB: ${TEAMSHARED_PG_DB:-teamshared}
      TEAMSHARED_REDIS_URL: redis://redis:6379/0
      TEAMSHARED_TOKENS_FILE: /data/tokens.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TEAMSHARED_EMBED_PROVIDER: ${TEAMSHARED_EMBED_PROVIDER:-openai}
      TEAMSHARED_EMBED_MODEL: ${TEAMSHARED_EMBED_MODEL:-text-embedding-3-small}
      TEAMSHARED_EMBED_DIMS: ${TEAMSHARED_EMBED_DIMS:-1536}
      TEAMSHARED_LLM_PROVIDER: ${TEAMSHARED_LLM_PROVIDER:-openai}
      TEAMSHARED_LLM_MODEL: ${TEAMSHARED_LLM_MODEL:-gpt-4o-mini}
      TEAMSHARED_OLLAMA_BASE_URL: ${TEAMSHARED_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - teamshareddata:/data
    command: ["teamshared", "worker"]

  # Optional: enable when TEAMSHARED_NEO4J_ENABLED=true and you want the relationship graph.
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: ${TEAMSHARED_NEO4J_USER:-neo4j}/${TEAMSHARED_NEO4J_PASSWORD:-neo4j}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  redisdata:
  teamshareddata:
  neo4jdata:
