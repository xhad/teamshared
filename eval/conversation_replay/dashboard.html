<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>teamshared conversation replay</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --panel-2: #243044;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --baseline: #f59e6c;
      --memory: #5bbea8;
      --pass: #6bcf8b;
      --fail: #f07178;
      --border: #2e3d54;
      --accent: #7aa2f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }
    h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    .sub { color: var(--muted); font-size: 0.85rem; }
    main { padding: 1.25rem 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
    .drop {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      color: var(--muted);
      margin-bottom: 1.25rem;
      background: var(--panel);
    }
    .drop.hidden { display: none; }
    .drop.drag { border-color: var(--accent); color: var(--text); }
    .hint {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }
    .hint code { color: var(--text); }
    .hint.hidden { display: none; }
    .runs { display: grid; gap: 1.25rem; }
    .run {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .run-head {
      padding: 1rem 1.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .run-title { font-weight: 600; }
    .badges { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .badge {
      font-size: 0.72rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .badge.pass { color: var(--pass); border-color: #3d6b52; }
    .badge.fail { color: var(--fail); border-color: #6b3d42; }
    .badge.neutral { color: var(--accent); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      padding: 1rem 1.1rem;
    }
    .stat {
      background: var(--panel-2);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
    }
    .stat .k { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat .v { font-size: 1.25rem; font-weight: 600; margin-top: 0.15rem; }
    .stat .v.good { color: var(--memory); }
    .chart-wrap { padding: 0 1.1rem 1rem; overflow-x: auto; }
    svg { width: 100%; min-width: 520px; height: auto; display: block; }
    .legend { display: flex; gap: 1rem; padding: 0 1.1rem 0.75rem; font-size: 0.8rem; color: var(--muted); }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 2px;
      margin-right: 0.35rem;
      vertical-align: -1px;
    }
    .legend .b::before { background: var(--baseline); }
    .legend .m::before { background: var(--memory); }
    table {
      width: calc(100% - 2.2rem);
      margin: 0 1.1rem 1rem;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    th, td { padding: 0.45rem 0.5rem; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 500; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .agent { margin: 0 1.1rem 1rem; }
    .agent table { width: 100%; margin: 0; }
    .empty { color: var(--muted); text-align: center; padding: 3rem 1rem; }
    .empty.hidden { display: none; }
    .error {
      color: var(--fail);
      background: #2a1a1d;
      border: 1px solid #6b3d42;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      display: none;
    }
    input[type=file] { display: none; }
    button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      font: inherit;
    }
    button:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>teamshared conversation replay</h1>
      <div class="sub" id="meta">Baseline vs memory token cost per turn</div>
    </div>
    <div>
      <button type="button" id="pick">Load JSON</button>
      <input type="file" id="file" accept="application/json,.json" />
    </div>
  </header>
  <main>
    <div class="hint" id="hint">
      Open <code>eval/conversation_replay/results/dashboard.html</code> after running
      <code>make eval-conversation-report-http</code>, or drop a <code>run-*.json</code> file below.
    </div>
    <div class="error" id="error"></div>
    <div class="drop" id="drop">Drop a replay JSON file here</div>
    <div class="runs" id="runs"></div>
    <div class="empty" id="empty">No data loaded yet.</div>
  </main>
  <!-- REPLAY_DATA_EMBED -->
  <script>
    const runsEl = document.getElementById("runs");
    const emptyEl = document.getElementById("empty");
    const metaEl = document.getElementById("meta");
    const dropEl = document.getElementById("drop");
    const hintEl = document.getElementById("hint");
    const errorEl = document.getElementById("error");
    const fileEl = document.getElementById("file");
    const pickEl = document.getElementById("pick");

    function esc(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function fmt(n) {
      const v = Number(n);
      return Number.isFinite(v) ? v.toLocaleString() : "—";
    }

    function pct(n) {
      const v = Number(n);
      return Number.isFinite(v) ? v.toFixed(1) + "%" : "—";
    }

    function badge(label, state) {
      const cls = state === true ? "pass" : state === false ? "fail" : "neutral";
      const text = state === true ? label + " pass" : state === false ? label + " fail" : label;
      return '<span class="badge ' + cls + '">' + esc(text) + "</span>";
    }

    function chartSvg(checkpoints) {
      if (!checkpoints.length) return "";
      const w = Math.max(520, checkpoints.length * 72);
      const h = 220;
      const padL = 48, padR = 16, padT = 16, padB = 72;
      const innerW = w - padL - padR;
      const innerH = h - padT - padB;
      const maxTok = Math.max.apply(null, checkpoints.flatMap(function (c) {
        return [c.baseline_tokens, c.memory_tokens];
      }).concat([1]));
      const groupW = innerW / checkpoints.length;
      const barW = Math.min(22, groupW * 0.32);
      let bars = "";
      checkpoints.forEach(function (cp, i) {
        const x0 = padL + i * groupW + groupW * 0.18;
        const bH = (cp.baseline_tokens / maxTok) * innerH;
        const mH = (cp.memory_tokens / maxTok) * innerH;
        const yBase = padT + innerH - bH;
        const yMem = padT + innerH - mH;
        const cx = x0 + barW;
        const label = esc((cp.label || ("t" + cp.turn)).slice(0, 18));
        bars += '<rect x="' + x0 + '" y="' + yBase + '" width="' + barW + '" height="' + bH + '" fill="#f59e6c" rx="2"/>';
        bars += '<rect x="' + (x0 + barW + 4) + '" y="' + yMem + '" width="' + barW + '" height="' + mH + '" fill="#5bbea8" rx="2"/>';
        bars += '<text x="' + cx + '" y="' + (h - 42) + '" fill="#8b9cb3" font-size="10" text-anchor="middle" transform="rotate(-32 ' + cx + " " + (h - 42) + ')">' + label + "</text>";
      });
      let yTicks = "";
      [0, 0.25, 0.5, 0.75, 1].forEach(function (f) {
        const y = padT + innerH - f * innerH;
        const val = Math.round(maxTok * f);
        yTicks += '<line x1="' + padL + '" y1="' + y + '" x2="' + (w - padR) + '" y2="' + y + '" stroke="#2e3d54" stroke-width="1"/>';
        yTicks += '<text x="' + (padL - 8) + '" y="' + (y + 4) + '" fill="#8b9cb3" font-size="10" text-anchor="end">' + fmt(val) + "</text>";
      });
      return '<svg viewBox="0 0 ' + w + " " + h + '" role="img" aria-label="token chart"><rect width="100%" height="100%" fill="transparent"/>' + yTicks + bars + "</svg>";
    }

    function renderRun(run) {
      const cps = run.checkpoints || [];
      let agentHtml = "";
      const agent = run.agent;
      if (agent && agent.length) {
        const rows = agent.map(function (a) {
          return "<tr><td>" + esc(a.arm) + '</td><td class="num">' + (a.success ? "✓" : "✗") + '</td><td class="num">' + esc(a.tool_calls ?? "-") + '</td><td class="num">' + esc((a.matched_groups ?? "-") + "/" + (a.total_groups ?? "-")) + "</td><td>" + esc(a.answer_preview || "") + "</td></tr>";
        }).join("");
        agentHtml = '<div class="agent"><table><thead><tr><th>arm</th><th>ok</th><th>tools</th><th>expect</th><th>preview</th></tr></thead><tbody>' + rows + "</tbody></table></div>";
      }
      const rows = cps.map(function (cp) {
        return "<tr><td>" + esc(cp.turn) + "</td><td>" + esc(cp.label || "") + '</td><td class="num">' + fmt(cp.baseline_tokens) + '</td><td class="num">' + fmt(cp.memory_tokens) + '</td><td class="num">' + pct(cp.saved_pct) + "</td></tr>";
      }).join("");
      return '<article class="run"><div class="run-head"><div class="run-title">' + esc(run.fixture) + ' <span class="sub">(' + esc(run.mode) + ')</span></div><div class="badges">' + badge("overall", run.passed) + (run.recall_passed == null ? "" : badge("recall", run.recall_passed)) + (run.context_expect_passed == null ? "" : badge("context", run.context_expect_passed)) + '</div></div><div class="stats"><div class="stat"><div class="k">baseline final</div><div class="v">' + fmt(run.baseline_final_tokens) + '</div></div><div class="stat"><div class="k">memory final</div><div class="v good">' + fmt(run.memory_final_tokens) + '</div></div><div class="stat"><div class="k">final saved</div><div class="v good">' + pct(run.token_reduction_pct) + '</div></div><div class="stat"><div class="k">session baseline</div><div class="v">' + fmt(run.baseline_session_tokens) + '</div></div><div class="stat"><div class="k">session memory</div><div class="v good">' + fmt(run.memory_session_tokens) + '</div></div><div class="stat"><div class="k">session saved</div><div class="v good">' + pct(run.session_token_reduction_pct) + '</div></div><div class="stat"><div class="k">est. session $</div><div class="v">' + (run.baseline_est_input_usd != null ? ("$" + run.baseline_est_input_usd.toFixed(4) + " → $" + run.memory_est_input_usd.toFixed(4)) : "—") + '</div></div><div class="stat"><div class="k">turns</div><div class="v">' + esc(run.turn_count) + "</div></div></div><div class=\"legend\"><span class=\"b\">baseline</span><span class=\"m\">memory</span></div><div class=\"chart-wrap\">" + chartSvg(cps) + '</div><table><thead><tr><th>#</th><th>turn</th><th>baseline</th><th>memory</th><th>saved</th></tr></thead><tbody>' + rows + "</tbody></table>" + agentHtml + "</article>";
    }

    function normalizePayload(data) {
      if (!data) return [];
      if (Array.isArray(data)) return data;
      if (data.runs) return data.runs;
      if (data.fixture) return [data];
      return [];
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = msg ? "block" : "none";
    }

    function renderAll(payload) {
      showError("");
      const runs = normalizePayload(payload);
      runsEl.innerHTML = runs.map(renderRun).join("");
      const has = runs.length > 0;
      emptyEl.classList.toggle("hidden", has);
      hintEl.classList.toggle("hidden", has);
      dropEl.classList.toggle("hidden", has);
      const when = payload && payload.recorded_at ? " · " + payload.recorded_at : "";
      metaEl.textContent = runs.length + " run(s)" + when;
    }

    function loadJsonText(text) {
      try {
        renderAll(JSON.parse(text));
      } catch (e) {
        showError("Invalid JSON: " + e.message);
      }
    }

    function readEmbedded() {
      const el = document.getElementById("replay-data");
      if (!el || !el.textContent || !el.textContent.trim()) return null;
      try {
        return JSON.parse(el.textContent);
      } catch (e) {
        showError("Embedded data parse error: " + e.message);
        return null;
      }
    }

    async function boot() {
      let data = readEmbedded();
      if (!data) {
        try {
          const resp = await fetch("latest.json", { cache: "no-store" });
          if (resp.ok) data = await resp.json();
        } catch (e) {
          /* file:// or no latest.json — ignore */
        }
      }
      if (data && normalizePayload(data).length) {
        renderAll(data);
      }
    }

    pickEl.addEventListener("click", function () { fileEl.click(); });
    fileEl.addEventListener("change", function () {
      const f = fileEl.files && fileEl.files[0];
      if (!f) return;
      f.text().then(loadJsonText);
    });
    dropEl.addEventListener("dragover", function (e) { e.preventDefault(); dropEl.classList.add("drag"); });
    dropEl.addEventListener("dragleave", function () { dropEl.classList.remove("drag"); });
    dropEl.addEventListener("drop", function (e) {
      e.preventDefault();
      dropEl.classList.remove("drag");
      const f = e.dataTransfer.files[0];
      if (f) f.text().then(loadJsonText);
    });

    boot();
  </script>
</body>
</html>
