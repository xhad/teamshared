<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/console.css" />
  <title>Sign in &middot; TeamShared</title>
</head>
<body class="login-page">
  {% if stage == 'code' %}
  <form class="login" method="post" action="/login/verify">
    <div class="brand"><span class="brand-mark" aria-hidden="true"></span>TeamShared</div>
    {% if message %}<div class="note{% if error %} err{% endif %}">{{ message }}
      {% if otp_code %}<strong class="otp" data-otp="{{ otp_code }}">{{ otp_code }}</strong>{% endif %}</div>{% endif %}
    <input type="hidden" name="email" value="{{ email }}" />
    <label for="code">One-time code</label>
    <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code"
      pattern="[0-9]*" maxlength="6" placeholder="000000" required autofocus />
    <button type="submit">Verify &amp; sign in</button>
    <p class="alt"><a href="/login">Use a different email</a></p>
  </form>
  {% else %}
  <form class="login" method="post" action="/login">
    <div class="brand"><span class="brand-mark" aria-hidden="true"></span>TeamShared</div>
    <p class="tagline">Sign in or create your free account.</p>
    {% if message %}<div class="note{% if error %} err{% endif %}">{{ message }}</div>{% endif %}
    <label for="email">Your email</label>
    <input id="email" name="email" type="email" placeholder="you@example.com" required autofocus />
    <button type="submit">Send code</button>
  </form>
  {% endif %}
</body>
</html>
