# Add this block under `mcp_servers:` in ~/.hermes/config.yaml.
# Replace <agent-token> with the value from `sptx token mint hermes`.
mcp_servers:
  sptx-memory:
    url: https://memory.tailXXXX.ts.net/mcp
    headers:
      Authorization: "Bearer <agent-token>"
    timeout: 30
    connect_timeout: 10
    tools:
      resources: true
      prompts: false
