name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Ruff
        run: ruff check src tests scripts eval

      - name: Mypy
        continue-on-error: true
        run: mypy src

      - name: Pytest
        run: pytest -q

      - name: Validate teamshared plugin
        run: bash scripts/validate-teamshared-plugin.sh

      - name: Smoke scripts (in-memory)
        run: |
          python scripts/smoke_cross_agent.py --in-memory
          python scripts/smoke_all_tools.py --in-memory
          python eval/run.py --in-memory
