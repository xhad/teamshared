name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full scan (Mondays 06:17 UTC) so new CVEs surface without a push.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@v4

  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Export locked dependencies
        run: uv export --no-dev --no-emit-project --format requirements-txt > requirements-audit.txt
      - name: Audit locked dependencies against known CVEs
        run: uvx pip-audit --no-deps -r requirements-audit.txt --progress-spinner off

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so leaked secrets in past commits are caught too.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build production image
        run: docker build -f infra/Dockerfile -t teamshared:scan .
      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: teamshared:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
